name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_ENV: test
  DATABASE_URL: 'file:./prisma/stockmate.db'
  JWT_ACCESS_SECRET: ci-access-secret
  JWT_REFRESH_SECRET: ci-refresh-secret
  JWT_ACCESS_EXPIRY: 15m
  JWT_REFRESH_EXPIRY: 7d
  FRONTEND_URL: http://localhost:3000
  PORT: 0

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run backend tests
        working-directory: backend
        shell: bash
        run: |
          npm test -- --verbose 2>&1 | tee test-output.log
          # Capture exit code so we can upload artifacts before failing
          exit ${PIPESTATUS[0]}

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: backend/test-output.log
          retention-days: 14

      - name: Report test results
        if: always()
        run: |
          if [ -f backend/test-output.log ]; then
            if grep -q "Tests:" backend/test-output.log; then
              tail -5 backend/test-output.log
              if grep -q "failed" backend/test-output.log || grep -q "FAIL" backend/test-output.log; then
                echo "## ❌ Some tests failed" >> $GITHUB_STEP_SUMMARY
                tail -20 backend/test-output.log >> $GITHUB_STEP_SUMMARY
                exit 1
              else
                echo "## ✅ All tests passed" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "## ⚠️ Test output missing results line" >> $GITHUB_STEP_SUMMARY
              tail -10 backend/test-output.log >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          else
            echo "## ❌ No test output file found" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
