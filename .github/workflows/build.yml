name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Vite frontend
        working-directory: frontend
        run: npm run build

      - name: Build Electron app
        id: electron-build
        working-directory: frontend
        run: |
          npx electron-builder --${{ matrix.platform }} --publish never 2>&1 | tee ../build-output.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build log on failure
        if: steps.electron-build.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.platform }}
          path: build-output.log
          retention-days: 5

      - name: Fail if build failed
        if: steps.electron-build.outputs.exit_code != '0'
        run: |
          echo "Build failed! Check the build-log artifact for details."
          cat build-output.log
          exit 1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stockmate-pro-${{ matrix.platform }}
          path: |
            frontend/release/*.exe
            frontend/release/*.dmg
            frontend/release/*.AppImage
            frontend/release/*.deb
            frontend/release/*.yml
            frontend/release/*.yaml
          if-no-files-found: warn
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/release/*.exe
            frontend/release/*.dmg
            frontend/release/*.AppImage
            frontend/release/*.deb
            frontend/release/*.yml
            frontend/release/*.yaml
          fail_on_unmatched_files: false
