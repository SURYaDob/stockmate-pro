name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            build-cmd: npx electron-builder --win --publish never
          - os: macos-latest
            platform: mac
            build-cmd: npx electron-builder --mac --publish never
          - os: ubuntu-latest
            platform: linux
            build-cmd: npx electron-builder --linux --publish never

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            libx11-xcb1 \
            libxcb-dri3-0 \
            libxcb-render0 \
            libxcb-render-util0 \
            libxcb-keysyms1 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-shm0 \
            libxcb-util1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Vite frontend
        working-directory: frontend
        run: npm run build

      - name: Debug build environment
        working-directory: frontend
        shell: bash
        run: |
          echo "=== Node version ==="
          node --version
          echo "=== NPM version ==="
          npm --version
          echo "=== electron-builder version ==="
          npx electron-builder --version
          echo "=== Dist directory ==="
          ls -la dist/ || echo "No dist/ directory"
          echo "=== Public icons ==="
          ls -la public/icons/ || echo "No icons directory"

      - name: Build Electron app
        id: electron-build
        working-directory: frontend
        shell: bash
        run: |
          ${{ matrix.build-cmd }} 2>&1 || {
            echo "=== BUILD FAILED — dumping debug info ==="
            echo "Release directory:"
            ls -la release/ || true
            echo "=== package.json build config ==="
            node -e "const p=JSON.parse(require('fs').readFileSync('package.json','utf8')); console.log(JSON.stringify(p.build, null, 2))"
            exit 1
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.platform }}
          path: frontend/release/
          retention-days: 5

      - name: List release artifacts
        if: success()
        shell: bash
        working-directory: frontend
        run: |
          echo "=== Release output ==="
          ls -la release/ || echo "No release/ directory"

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: stockmate-pro-${{ matrix.platform }}
          path: |
            frontend/release/*.exe
            frontend/release/*.dmg
            frontend/release/*.AppImage
            frontend/release/*.deb
            frontend/release/*.yml
            frontend/release/*.yaml
          if-no-files-found: warn
          retention-days: 30

      - name: Attach to release
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/release/*.exe
            frontend/release/*.dmg
            frontend/release/*.AppImage
            frontend/release/*.deb
            frontend/release/*.yml
            frontend/release/*.yaml
          fail_on_unmatched_files: false
