name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            build-cmd: npx electron-builder --win --publish never
          - os: macos-latest
            platform: mac
            build-cmd: npx electron-builder --mac --publish never
          - os: ubuntu-latest
            platform: linux
            build-cmd: npx electron-builder --linux --publish never

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            libx11-xcb1 \
            libxcb-dri3-0 \
            libxcb-render0 \
            libxcb-render-util0 \
            libxcb-keysyms1 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-shm0 \
            libxcb-util1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Vite frontend
        working-directory: frontend
        run: npm run build

      - name: Build Electron app
        id: electron-build
        working-directory: frontend
        shell: bash
        run: |
          set +e
          ${{ matrix.build-cmd }} 2>&1 | tee /tmp/build-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit $EXIT_CODE
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write error summary
        if: failure()
        shell: bash
        run: |
          {
            echo "## ❌ Build Failed (${{ matrix.platform }})"
            echo ""
            echo "### Last 200 lines of output:"
            echo '```'
            tail -200 /tmp/build-output.log 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload build output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ matrix.platform }}
          path: /tmp/build-output.log
          retention-days: 30

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: stockmate-pro-${{ matrix.platform }}
          path: |
            frontend/release/*.exe
            frontend/release/*.dmg
            frontend/release/*.AppImage
            frontend/release/*.deb
            frontend/release/*.yml
            frontend/release/*.yaml
          if-no-files-found: warn
          retention-days: 30

      - name: Attach to release
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/release/*.exe
            frontend/release/*.dmg
            frontend/release/*.AppImage
            frontend/release/*.deb
            frontend/release/*.yml
            frontend/release/*.yaml
          fail_on_unmatched_files: false
