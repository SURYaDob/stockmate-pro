# ===========================================
# StockMate Pro — Docker Compose (Legacy Web Version)
# ===========================================
# NOTE: StockMate Pro v2.0 is now a desktop app using Electron + SQLite.
# This docker-compose.yml is kept for reference only.
# For the desktop app, see README.md.
# ===========================================
#
# Start with:  docker compose up -d
# Stop with:   docker compose down
# View logs:   docker compose logs -f
# ===========================================

name: stockmate-pro

services:
  # ---------- Backend API (with SQLite) ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockmate-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=file:/app/data/stockmate.db
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-stockmate-jwt-access-secret-change-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-stockmate-jwt-refresh-secret-change-in-production}
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - FRONTEND_URL=http://localhost:3000
      - BACKEND_URL=http://localhost:5000
      - MAX_FILE_SIZE=5242880
      - UPLOAD_DIR=./uploads
      - DEFAULT_GST_RATE=18
      - STATE_CODE=27
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    networks:
      - stockmate-net

  # ---------- Frontend (nginx) ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockmate-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - stockmate-net

# ---------- Volumes ----------
volumes:
  backend_data:
    driver: local
  backend_uploads:
    driver: local

# ---------- Networks ----------
networks:
  stockmate-net:
    driver: bridge
